name: test

# Phase 0 of the Windows port (iter 27): a red Windows CI is the
# verification surface. Each phase of the port makes another slice of
# `pytest -q` go green on `windows-latest`. macOS and Linux must stay green
# at every step — they are the regression guard.
#
# Tests force `SKEIN_EMBEDDING_PROVIDER=hash` via tests/conftest.py, so the
# fastembed 130 MB model download does not happen in CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run pytest
        env:
          # Hash provider — no model download, fully offline. conftest.py
          # already sets this, but pinning at the workflow level documents
          # intent.
          SKEIN_EMBEDDING_PROVIDER: hash
        run: pytest -q --tb=short
